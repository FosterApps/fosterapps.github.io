<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <meta name="robots" content="noindex, nofollow" />

    <title>Foster Apps – Checkout</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/site.css?v=6" />
    <link rel="icon" type="image/png" href="/assets/FosterAppsLogo.png" />

    <script async src="https://js.stripe.com/v3/buy-button.js"></script>

    <style>
      .checkout-page {
        min-height: calc(100vh - 120px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 64px 24px 80px;
        background: var(--bg);
      }

      .checkout-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        box-shadow: var(--shadow-md);
        padding: 48px 40px;
        width: 100%;
        max-width: 480px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }

      .checkout-brand {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        text-decoration: none;
        margin-bottom: 16px;
      }

      .checkout-brand .brand-mark {
        width: 32px;
        height: 32px;
        border-radius: 10px;
      }

      .checkout-brand span {
        font-family: var(--font-body);
        font-weight: 600;
        font-size: 16px;
        color: var(--text);
        letter-spacing: -0.01em;
      }

      .checkout-page h1 {
        font-family: var(--font-display);
        font-size: clamp(24px, 4vw, 32px);
        font-weight: 400;
        letter-spacing: -0.02em;
        line-height: 1.1;
        color: var(--text);
        margin: 0;
        text-align: center;
      }

      .checkout-page h1 em {
        font-style: italic;
      }

      .checkout-page p {
        font-family: var(--font-body);
        font-size: 14px;
        color: var(--muted);
        text-align: center;
        margin: 4px 0 24px;
        line-height: 1.6;
      }

      .checkout-divider {
        width: 100%;
        height: 1px;
        background: var(--border);
        margin: 8px 0 24px;
      }

      .stripe-wrapper {
        display: flex;
        justify-content: center;
        width: 100%;
      }

      .checkout-secure {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--muted2);
        margin-top: 20px;
      }

      .checkout-secure svg {
        flex-shrink: 0;
      }

      @media (max-width: 520px) {
        .checkout-card {
          padding: 36px 24px;
        }
      }
    </style>
  </head>

  <body>
    <header class="header">
      <div class="container">
        <div class="header-inner">
          <a class="brand" href="/">
            <span class="brand-mark" aria-hidden="true"></span>
            <span class="brand-name">Foster Apps</span>
          </a>
        </div>
      </div>
    </header>

    <main>
      <section class="checkout-page">
        <div class="checkout-card">
          <a class="checkout-brand" href="/">
            <span class="brand-mark" aria-hidden="true"></span>
            <span>Foster Apps</span>
          </a>

          <h1>Complete your<br><em>purchase.</em></h1>
          <p>Secure checkout powered by Stripe.<br>Questions? <a href="mailto:help@fosterapps.com" style="color:var(--accent);">help@fosterapps.com</a></p>

          <div class="checkout-divider"></div>

          <div class="stripe-wrapper">
            <stripe-buy-button
              buy-button-id="buy_btn_1Tf4Sv0gqZEJXMT7yxzdUrnK"
              publishable-key="pk_live_51Tf43R0gqZEJXMT7KhtAS1c2JuGN06Io5Q1EILg51FbgmhM8ETrjAUuOgLsqcExDRbSGhmOFm3L4pTitPnWkqIGz00pH2QsR0a"
            ></stripe-buy-button>
          </div>

          <p class="checkout-secure">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
              <path d="M3 5V4a3 3 0 116 0v1M2 5h8a1 1 0 011 1v4a1 1 0 01-1 1H2a1 1 0 01-1-1V6a1 1 0 011-1z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
            Secured by Stripe — your payment info is never stored by us
          </p>
        </div>
      </section>
    </main>

    <script src="../assets/js/site.js?v=6"></script>
  </body>
</html>
